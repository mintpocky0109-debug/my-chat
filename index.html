<!DOCTYPE html>
<html>
<head>
    <title>실시간 채팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    
    <style>
    /* 1. 전체 배경 및 폰트 설정 */
    body { 
        font-family: 'Nanum Gothic', sans-serif; 
        margin: 0; 
        padding: 0; 
        background-color: #f0f2f5; /* 연한 회색 배경 */
        display: flex;
        flex-direction: column;
        height: 100vh; /* 화면 꽉 채우기 */
    }

    /* 2. 상단 제목 */
    h2 { 
        background-color: #ffffff;
        margin: 0;
        padding: 15px;
        font-size: 1.2rem;
        color: #333;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    /* 3. 닉네임 입력칸 */
    #username {
        margin: 10px;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 20px;
        text-align: center;
        outline: none;
    }

    /* 4. 채팅 메시지 창 (말풍선들이 떠다닐 곳) */
    #messages { 
        flex: 1; /* 남은 공간 모두 차지 */
        overflow-y: auto; 
        padding: 20px; 
        display: flex;
        flex-direction: column;
        gap: 10px; /* 메시지 사이 간격 */
        list-style: none;
    }

    /* 5. 공통 메시지 스타일 (말풍선 기본) */
    #messages li {
        max-width: 70%;
        padding: 10px 15px;
        border-radius: 15px;
        font-size: 14px;
        line-height: 1.4;
        position: relative;
    }

    /* 내가 보낸 메시지: 오른쪽, 노란색 */
    .my-msg { 
        align-self: flex-end;
        background-color: #fee500; /* 카톡 노란색 */
        color: #333;
        border-bottom-right-radius: 2px !important;
    }

    /* 남이 보낸 메시지: 왼쪽, 흰색 */
    .other-msg { 
        align-self: flex-start;
        background-color: #ffffff;
        color: #333;
        border-bottom-left-radius: 2px !important;
        border: 1px solid #ddd;
    }

    /* 6. 하단 입력창 영역 */
    .input-area {
        background-color: #ffffff;
        padding: 10px;
        display: flex;
        gap: 10px;
        border-top: 1px solid #ddd;
    }

    #input { 
        flex: 1; 
        padding: 12px; 
        border: 1px solid #ddd; 
        border-radius: 25px; 
        outline: none;
    }

    button { 
        background-color: #fee500; 
        border: none; 
        padding: 0 20px; 
        border-radius: 20px; 
        font-weight: bold; 
        cursor: pointer;
    }
</style>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>
    <h2>실시간 채팅방</h2>
    <div style="text-align: center;">
        <input id="username" type="text" placeholder="닉네임 입력">
    </div>
    
    <ul id="messages"></ul>
    
    <div class="input-area">
        <input id="input" autocomplete="off" placeholder="메시지를 입력하세요" 
            onkeypress="if(event.keyCode==13) sendMessage();" />
        <button onclick="sendMessage()">보내기</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  // [추가] 브라우저 알림 권한 요청 (접속하자마자 물어봅니다)
  if (Notification.permission !== 'granted' && Notification.permission !== 'denied') {
    Notification.requestPermission();
  }

  function sendMessage() {
    const nameInput = document.getElementById('username');
    const msgInput = document.getElementById('input');

    if (nameInput.value && msgInput.value) {
      socket.emit('chat message', {
        name: nameInput.value,
        text: msgInput.value
      });
      msgInput.value = '';
    } else {
      alert("닉네임과 내용을 입력해주세요!");
    }
  }

  socket.on('chat message', function(data) {
    const item = document.createElement('li');
    item.textContent = `${data.name} : ${data.text}`;
    
    const myName = document.getElementById('username').value;
    item.className = (data.name === myName) ? 'my-msg' : 'other-msg';
    
    const chatBox = document.getElementById('messages');
    chatBox.appendChild(item);
    chatBox.scrollTop = chatBox.scrollHeight;

    // [추가] 내가 보낸 게 아니고, 알림 권한이 허용된 경우에만 알림 띄우기
    if (data.name !== myName && Notification.permission === 'granted') {
      new Notification(`${data.name}님의 메시지`, {
        body: data.text,
        // 필요하다면 아이콘 이미지 경로를 넣을 수 있습니다.
      });
    }
  });
</script>
</body>
</html>
