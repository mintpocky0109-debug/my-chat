<!DOCTYPE html>
<html>
<head>
    <title>실시간 채팅</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    
    <style>
        /* 2. 모바일에서 터치하기 편하게 크기를 키운 스타일입니다 */
        body { font-family: sans-serif; margin: 0; padding: 10px; box-sizing: border-box; }
        #messages { border: 1px solid #ccc; height: 350px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; list-style: none; }
        #input { width: 65%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 25%; padding: 12px; font-size: 16px; cursor: pointer; }
        .my-msg { color: blue; text-align: right; margin-bottom: 5px; }
        .other-msg { color: black; text-align: left; margin-bottom: 5px; }
    </style>
</head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>
    <h2>실시간 채팅방</h2>
    <input id="username" type="text" placeholder="닉네임 입력" style="width: 100px;">
    <hr>
    <ul id="messages"></ul>
    
    <input id="input" autocomplete="off" placeholder="메시지를 입력하세요" 
        onkeypress="if(event.keyCode==13) sendMessage();" />
    <button onclick="sendMessage()">보내기</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      // 중요: io() 안에 아무것도 넣지 마세요!
      const socket = io();

      function sendMessage() {
        const nameInput = document.getElementById('username');
        const msgInput = document.getElementById('input');

        if (nameInput.value && msgInput.value) {
          socket.emit('chat message', {
            name: nameInput.value,
            text: msgInput.value
          });
          msgInput.value = '';
        } else {
          alert("닉네임과 내용을 입력해주세요!");
        }
      }

      socket.on('chat message', function(data) {
        const item = document.createElement('li');
        item.textContent = `${data.name} : ${data.text}`;
        
        const myName = document.getElementById('username').value;
        item.className = (data.name === myName) ? 'my-msg' : 'other-msg';
        
        const chatBox = document.getElementById('messages');
        chatBox.appendChild(item);
        chatBox.scrollTop = chatBox.scrollHeight;
      });
    </script>
</body>
</html>
